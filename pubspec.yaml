name: sudoku_app
description: Ultra Premium Sudoku App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Animations
  google_fonts: 6.1.0
  flutter_animate: ^4.3.0
  
  # Utils
  collection: ^1.18.0
  intl: ^0.19.0
  go_router: ^14.6.2
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
