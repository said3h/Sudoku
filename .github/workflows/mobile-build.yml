name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-premium-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios-ipa:
    name: iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS build files
        run: flutter build ios --release --config-only --no-codesign

      - name: Install CocoaPods dependencies
        run: pod install --project-directory=ios

      - name: Build unsigned iOS app with Xcode
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          rm -rf build/ios/Payload
          mkdir -p build/ios/Payload
          cp -R build/ios/Build/Products/Release-iphoneos/Runner.app build/ios/Payload/Runner.app
          cd build/ios
          ditto -c -k --sequesterRsrc --keepParent Payload sudoku-premium-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-premium-ipa
          path: build/ios/sudoku-premium-unsigned.ipa
          if-no-files-found: error
